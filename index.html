<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página en Construcción</title>
    <style>
      body {
        text-align: center;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
      }
      h1 {
        margin-top: 20px;
      }
      .game-container {
        position: relative;
        width: 90%;
        max-width: 600px;
        height: 200px;
        border-bottom: 2px solid black;
        margin: 50px auto;
        overflow: hidden;
        background-color: transparent;
        /* background-image: url("https://i.imgur.com/tYtrq0Q.png"); Imagen de una ruta */
        background-size: cover;
        background-position: center;
      }
      .car {
        width: 50px;
        height: 47px;
        background-image: url("coche.png");
        background-size: cover;
        position: absolute;
        bottom: -1px;
        left: 10%;
        animation: moveCar 3s linear infinite;
      }
      .cactus {
        width: 80px;
        height: 80px;
        background-image: url("arbol.png");
        background-size: cover;
        position: absolute;
        bottom: 0px;
        right: -20px;
        animation: moveCactus 2s linear infinite;
      }
      @keyframes moveCactus {
        from {
          right: -20px;
        }
        to {
          right: 100%;
        }
      }
      @keyframes moveCar {
        from {
          left: -20px;
        }
        to {
          left: 100%;
        }
      }
      @media (max-width: 600px) {
        .car {
          width: 30px;
          height: 27px;
        }
        .cactus {
          width: 50px;
          height: 50px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Página en Construcción</h1>
    <div class="game-container">
      <div class="car" id="car"></div>
      <div class="cactus"></div>
    </div>
    <script>
      document.addEventListener("keydown", function (event) {
        let car = document.getElementById("car");
        if (!car.classList.contains("jump")) {
          car.classList.add("jump");
          setTimeout(function () {
            car.classList.remove("jump");
          }, 500);
        }
      });
    </script>
  </body>
</html>
